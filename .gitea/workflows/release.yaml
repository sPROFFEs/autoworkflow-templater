name: Build and Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    runs-on: debian-12
    env:
      PROJECT_LANG: go
      GO_VERSION: '1.22.5'
      PYTHON_VERSION: '3.11'
      RUST_TOOLCHAIN: 'stable'
      NODE_VERSION: '20'
      JAVA_VERSION: '21'
      DOTNET_VERSION: '8.0.x'
      RUBY_VERSION: '3.3'
      PHP_VERSION: '8.3'
      DEBIAN_FRONTEND: noninteractive
      GOPATH: ${{ gitea.workspace }}/.go
      GOMODCACHE: ${{ gitea.workspace }}/.go/pkg/mod
      GOCACHE: ${{ gitea.workspace }}/.cache/go-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate language selector
        shell: bash
        run: |
          set -euo pipefail
          case "${PROJECT_LANG}" in
            go|python|rust|node|java|dotnet|ruby|php) ;;
            *)
              echo "ERROR: PROJECT_LANG invalido: ${PROJECT_LANG}"
              echo "Valores permitidos: go | python | rust | node | java | dotnet | ruby | php"
              exit 1
              ;;
          esac

      - name: Setup Go
        if: ${{ env.PROJECT_LANG == 'go' }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Python
        if: ${{ env.PROJECT_LANG == 'python' }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Rust
        if: ${{ env.PROJECT_LANG == 'rust' }}
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v rustup >/dev/null 2>&1; then
            apt-get update -qq
            apt-get install -y -qq \
              -o Dpkg::Options::=--force-confdef \
              -o Dpkg::Options::=--force-confold \
              curl ca-certificates > /dev/null
            curl https://sh.rustup.rs -sSf | sh -s -- -y --default-toolchain "${RUST_TOOLCHAIN}"
          fi
          . "$HOME/.cargo/env"
          rustup toolchain install "${RUST_TOOLCHAIN}"
          rustup default "${RUST_TOOLCHAIN}"
          rustc --version
          cargo --version

      - name: Setup Node.js
        if: ${{ env.PROJECT_LANG == 'node' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        if: ${{ env.PROJECT_LANG == 'java' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup .NET
        if: ${{ env.PROJECT_LANG == 'dotnet' }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Ruby
        if: ${{ env.PROJECT_LANG == 'ruby' }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}

      - name: Setup PHP
        if: ${{ env.PROJECT_LANG == 'php' }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: Build from tag version (SSOT)
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./build.sh
          export APP_VERSION="${GITHUB_REF_NAME#v}"
          ./build.sh

      - name: Package Linux binary with FPM (.deb)
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"

          apt-get update -qq
          apt-get install -y -qq \
            -o Dpkg::Options::=--force-confdef \
            -o Dpkg::Options::=--force-confold \
            ruby ruby-dev rubygems build-essential > /dev/null
          gem install --no-document fpm

          mkdir -p pkg-root/usr/local/bin
          LINUX_BIN=""

          while IFS= read -r file; do
            if file "$file" | grep -q 'ELF'; then
              LINUX_BIN="$file"
              break
            fi
          done < <(find dist -maxdepth 1 -type f | sort)

          if [ -n "$LINUX_BIN" ]; then
            install -m 0755 "$LINUX_BIN" "pkg-root/usr/local/bin/$(basename "$LINUX_BIN")"
            fpm \
              -s dir \
              -t deb \
              -n my_tool \
              -v "$VERSION" \
              --architecture amd64 \
              -C pkg-root \
              usr
          else
            echo "No Linux ELF binary found in dist/. Skipping .deb packaging."
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            dist/*
            *.deb
          if-no-files-found: error

  release:
    needs: build
    runs-on: debian-12
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release-files

      - name: Extract changelog notes (strict awk state machine)
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"

          NOTES="$(awk -v v="$VERSION" '
            BEGIN {
              target = "## [" v "]"
              target_with_date = target " - "
              found = 0
            }
            $0 ~ /^## \[/ {
              if ($0 == target || index($0, target_with_date) == 1) {
                found = 1
                next
              }
              if (found == 1) {
                exit
              }
            }
            found == 1 {
              print
            }
            END {
              if (found == 0) {
                exit 2
              }
            }
          ' CHANGELOG.md)" || {
            echo "ERROR: missing changelog entry for tag ${VERSION}."
            echo "Required heading format: ## [${VERSION}] - YYYY-MM-DD"
            exit 1
          }

          NOTES="$(printf '%s\n' "$NOTES" | sed '/^[[:space:]]*$/d')"
          if [ -z "$NOTES" ]; then
            echo "ERROR: changelog section for ${VERSION} is empty."
            exit 1
          fi

          EOF_MARKER="CHANGELOG_$(date +%s)_$RANDOM"
          {
            echo "RELEASE_BODY<<${EOF_MARKER}"
            printf '%s\n' "$NOTES"
            echo "${EOF_MARKER}"
          } >> "$GITHUB_ENV"

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-files

          find . -type f -print | sed 's#^\./##' | sort > /tmp/release_file_list.txt
          if [ ! -s /tmp/release_file_list.txt ]; then
            echo "ERROR: no files to publish in release-files/."
            exit 1
          fi

          : > checksums.sha256
          while IFS= read -r f; do
            sha256sum "$f" >> checksums.sha256
          done < /tmp/release_file_list.txt

          EOF_MARKER="SHA256_$(date +%s)_$RANDOM"
          {
            echo "SHA256_BLOCK<<${EOF_MARKER}"
            cat checksums.sha256
            echo "${EOF_MARKER}"
          } >> "$GITHUB_ENV"

      - name: Publish Gitea release
        uses: https://gitea.com/actions/gitea-release-action@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: |
            release-files/**
          body: |
            ${{ env.RELEASE_BODY }}

            ---
            ### SHA256
            ```text
            ${{ env.SHA256_BLOCK }}
            ```
